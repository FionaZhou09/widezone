<style>

  body {

    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(201,168,76,0.04) 40px,
      rgba(201,168,76,0.04) 41px
    );
    pointer-events: none;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 56px 40px 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .logo-block {}

  .logo-en {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
  }

  .logo-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    color: var(--cream);
    display: block;
  }

  .logo-sub {
    font-size: 15px;
    color: rgba(250,246,240,0.45);
    margin-top: 10px;
    letter-spacing: 1px;
    display: block;
  }

  .header-right {
    text-align: right;
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }

  .contact-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--cream);
    display: block;
  }

  .contact-email {
    font-size: 14px;
    color: rgba(250,246,240,0.6);
    display: block;
    margin-top: 4px;
  }

  .contact-email a {
    color: var(--gold-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-email a:hover { color: var(--gold); }

  /* ── RED BAND ── */
  .red-band {
    background: var(--red);
    padding: 11px 0;
    text-align: center;
  }
  .red-band span {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    font-weight: 400;
  }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 1100px;
    margin: 48px auto 0;
    padding: 0 40px;
  }

  .search-box {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 0;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 14px 20px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    background: transparent;
  }

  .search-box input::placeholder { color: var(--ink-light); }

  .search-icon {
    padding: 14px 18px;
    color: var(--ink-light);
    font-size: 16px;
  }

  /* ── CATEGORY TABS ── */
  .tabs-wrap {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 40px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    font-size: 12px;
    letter-spacing: 1px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink-light);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover, .tab.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* ── MAIN CONTENT ── */
  main {
    max-width: 1100px;
    margin: 48px auto 80px;
    padding: 0 40px;
  }

  /* ── CATEGORY SECTION ── */
  .cat-section {
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .cat-dot {
    width: 10px;
    height: 10px;
    background: var(--red);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }

  .cat-title-en {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .cat-count {
    margin-left: auto;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-light);
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 3px 10px;
  }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .product-card {
    background: #fff;
    padding: 18px 20px;
    transition: background 0.15s;
    position: relative;
  }

  .product-card:hover { background: #FDF9F4; }

  .product-card.hidden { display: none; }

  .prod-name-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
  }

  .prod-name-en {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 4px;
    line-height: 1.4;
  }

  .prod-unit {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 1px;
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 2px 8px;
    color: var(--red);
    font-weight: 500;
  }

  /* ── NO RESULTS ── */
  .no-results {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-light);
    display: none;
    font-size: 15px;
  }

  /* ── FOOTER ── */

    background: var(--ink);
    color: rgba(250,246,240,0.4);

    font-size: 11px;
    letter-spacing: 2px;

  footer a:hover { color: var(--gold); }

    .header-right { text-align: left; }
    .search-wrap, .tabs-wrap, main { padding: 0 20px; }
    .logo-zh { font-size: 30px; }
    .product-grid { grid-template-columns: 1fr 1fr; }
  }
</style>

let currentCat = 'all';
let searchVal = '';

// Build tabs
const tabsWrap = document.getElementById('tabsWrap');
data.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.cat = cat.category_key;
  btn.textContent = cat.category;
  btn.addEventListener('click', () => { currentCat = cat.category_key; searchVal = ''; document.getElementById('searchInput').value = ''; render(); setActiveTab(); });
  tabsWrap.appendChild(btn);
});

function setActiveTab() {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === currentCat));
}

document.querySelector('.tab[data-cat="all"]').addEventListener('click', () => {
  currentCat = 'all'; searchVal = ''; document.getElementById('searchInput').value = ''; render(); setActiveTab();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchVal = e.target.value.toLowerCase().trim();
  currentCat = 'all';
  setActiveTab();
  render();
});

function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  let totalVisible = 0;

  data.forEach((cat, ci) => {
    if (currentCat !== 'all' && cat.category_key !== currentCat) return;

    const filtered = cat.products.filter(p =>
      !searchVal ||
      p.name_zh.toLowerCase().includes(searchVal) ||
      p.name_en.toLowerCase().includes(searchVal)
    );

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.style.animationDelay = (ci * 0.06) + 's';

    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-dot"></div>
        <span class="cat-title-zh">${cat.category}</span>
        <span class="cat-count">${filtered.length} 款</span>
      </div>
      <div class="product-grid">
        ${filtered.map(p => `
          <div class="product-card">
            <div class="prod-name-zh">${p.name_zh}</div>
            <div class="prod-name-en">${p.name_en}</div>
            ${p.unit ? `<span class="prod-unit">${p.unit}</span>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    main.appendChild(sec);
  });

  document.getElementById('noResults').style.display = totalVisible === 0 ? 'block' : 'none';
}

render();
</script>
